<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LastMile Delivery</title>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

  <style>

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }

    .header {
      background-color: #111;
      color: white;
      padding: 15px 20px;
    }

    .header h1 {
      margin: 0;
    }

    .container {
      display: flex;
      gap: 30px;
      padding: 30px;
      align-items: flex-start;
    }

    .order-panel {
      width: 300px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    .order-panel input,
    .order-panel select,
    .order-panel button {

      width: 100%;
      padding: 10px;
      margin-top: 10px;
      box-sizing: border-box;
    }

    .order-panel button {
      background-color: #111;
      color: white;
      border: none;
      cursor: pointer;
    }

    .order-panel button:hover {
      background-color: #333;
    }

    #map {
      width: 1000px;
      height: 750px;
      background: white;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    .status-box {
      margin-top: 20px;
      padding: 10px;
      background: #eee;
      border-radius: 5px;
    }

    #response {
      max-height: 200px;
      overflow-y: auto;
      margin-top: 8px;
    }

    #response p {
      margin: 12px 0;
    }

  </style>
</head>

<body>

<div class="header">
  <h1>LastMile Delivery</h1>
</div>

<div class="container">

  <!-- CUSTOMER ORDER PANEL -->

  <div class="order-panel">

    <h2>Place Delivery</h2>

    <label>Pickup Location</label>

    <select id="faddr">

      <option value="ICA Nära Söderlivs">
        ICA Nära Söderlivs
      </option>

      <option value="ICA Malmborgs">
        ICA Malmborgs
      </option>

      <option value="Coop Mårtenstorget">
        Coop Mårtenstorget
      </option>

      <option value="ICA Maxi Stormarknad">
        ICA Maxi Stormarknad
      </option>

    </select>

    <label>Delivery Address</label>

    <input type="text" id="taddr">

    <button onclick="Submit()">
      Order Delivery
    </button>

    <div class="status-box">
      <strong>Status:</strong>
      <div id="response">Waiting for order...</div>
    </div>

  </div>

  <!-- MAP -->

  <object
    id="map"
    data="static/images/lund-map.svg"
    type="image/svg+xml">
  </object>

</div>

<script>

function Submit() {

  const data = {

    faddr: document.getElementById("faddr").value,

    taddr: document.getElementById("taddr").value
  };

  fetch("http://127.0.0.1:5004/planner", {

    method: "POST",

    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify(data)

  })

  .then(response => response.json())
  .then(data => {
    if (data.drone_id) {
      FADDR = document.getElementById("faddr").value;
      TADDR = document.getElementById("taddr").value;
      MY_DRONE_ID = data.drone_id;
      MISSION_STARTED = false;
      DELIVERY_REACHED = false;
      LAST_STATUS = null;
      addMessage("Found an available drone.");
      setTimeout(function () {
        addMessage("Drone is on its way to pick up location: " + FADDR);
      }, 2000);
    } else {
      addMessage(data.message || "No drone available, please try again later.");
    }
  })

  .catch(error => {
    addMessage("Error submitting order.");
  });

}

</script>

<script>

function LoadDrone(droneID, x, y, status) {

  var doc = document.getElementById("map");

  $(doc).ready(function() {

    var doc_svg = doc.getSVGDocument();

    if (!doc_svg) return;

    var svg = doc_svg.getElementById("map-svg");

    if (!svg) return;

    var circleNode = svg.getElementById(droneID);

    var color = "red";

    if (status == "idle") {
      color = "green";
    }

    else if (status == "picking_up") {
      color = "orange";
    }

    else if (status == "delivers") {
      color = "blue";
    }

    if (circleNode == null) {

      circleNode =
        doc_svg.createElementNS(
          "http://www.w3.org/2000/svg",
          "circle"
        );

      circleNode.setAttributeNS(null, "cx", x);
      circleNode.setAttributeNS(null, "cy", y);

      circleNode.setAttributeNS(null, "r", "7");

      circleNode.setAttributeNS(null, "fill", color);

      circleNode.setAttributeNS(null, "id", droneID);

      svg.appendChild(circleNode);

    }

    else {

      circleNode.setAttributeNS(null, "cx", x);

      circleNode.setAttributeNS(null, "cy", y);

      circleNode.setAttributeNS(null, "fill", color);
    }

  });

}

</script>

<script>

var set_delay = 10;

var MY_DRONE_ID = null;
var MISSION_STARTED = false;
var DELIVERY_REACHED = false;
var LAST_STATUS = null;
var FADDR = "";
var TADDR = "";
var MESSAGES_STARTED = false;


function removeDrone(droneID) {
  var doc = document.getElementById("map");
  var doc_svg = doc.getSVGDocument();
  if (!doc_svg) return;
  var svg = doc_svg.getElementById("map-svg");
  if (!svg) return;
  var node = svg.getElementById(droneID);
  if (node) node.parentNode.removeChild(node);
}

function addMessage(text) {
  var box = document.getElementById("response");
  if (!MESSAGES_STARTED) {
    box.innerHTML = "";
    MESSAGES_STARTED = true;

  }
  var p = document.createElement("p");
  p.textContent = text;
  box.appendChild(p);
  box.scrollTop = box.scrollHeight;
}

var callout = function () {

  $.ajax({

    url: 'http://127.0.0.1:5002/get_drones'

  })

.done(function(server_response) {
    if (!MY_DRONE_ID) return;
    var drone = server_response[MY_DRONE_ID];
    if (!drone) return;

    if (DELIVERY_REACHED && drone.status !== "delivers") {
      MESSAGES_STARTED = false;         
      addMessage("Delivery complete.");
      addMessage("Thank you for using LastMile!");
      removeDrone(MY_DRONE_ID);
      MY_DRONE_ID = null;
      MISSION_STARTED = false;
      DELIVERY_REACHED = false;
      LAST_STATUS = null;
      return;
    }

    if (drone.status === "idle") {
      if (MISSION_STARTED) {
        removeDrone(MY_DRONE_ID);
        MY_DRONE_ID = null;
        MISSION_STARTED = false;
        DELIVERY_REACHED = false;
        LAST_STATUS = null;
      }
      return;
    }

    MISSION_STARTED = true;

    if (drone.status !== LAST_STATUS) {
      if (drone.status === "picking_up") {
        addMessage("Drone is picking up your package...");

      } else if (drone.status === "busy" && LAST_STATUS === "picking_up") {
        addMessage("Your package was picked up successfully.");
        setTimeout(function () {
          addMessage("Drone is on its way to the delivery address: " + TADDR);
        }, 2000);

      } else if (drone.status === "delivers") {
        addMessage("Drone has arrived. Please scan the QR code within 15 seconds.");

        DELIVERY_REACHED = true;
      }
      LAST_STATUS = drone.status;
    }

    LoadDrone(MY_DRONE_ID, drone.longitude, drone.latitude, drone.status);
  })

  .always(function() {

    setTimeout(callout, set_delay);

  });

};

callout();

</script>

</body>
</html>
