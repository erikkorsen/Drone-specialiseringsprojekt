<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta charset="utf-8">
  <title>LastMile BETA</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }
    .header {
      width: 100%;
      padding: 15px 20px;
      background-color: #111;
      color: white;
      box-sizing: border-box;
    }
    .container {
      display: flex;
      gap: 30px;
      padding: 30px;
      width: 100%;
      align-items: stretch;
    }

    .left-panels {
      width: 340px;
      display: flex;
      flex-direction:column;
      background: white;
      gap: 15px;
    }
    .panel {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    #map {
      flex: 1;
      height: 800px;
      width: auto;
      min-width: 0;
    }

    #droneTable {
      width: 100%;
      font-size: 14px;
      border-collapse: collapse;
      margin-top: 0;
    }

    .start-btn{
      margin-top: 10px;
      padding: 6px 10px;
      font-size: 13px;
      background-color: #111;
      color: white;
      border: none;
      cursor: pointer;
      width: 100%;
    }

    .start-btn:hover {
      background-color: #333;
    }

    table {
      border-collapse: collapse;
      margin-top: 0;
    }

    th, td {
      border: 1px solid black;
      padding: 3px 6px;
      text-align: left;
    }
    .header h1 {
      margin: 0;
      font-size: 28px;
    }
  </style>
  <!--script type="text/javascript" src="https://d3js.org/d3.v3.min.js"></script>-->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>  
  <script type="text/javascript">
    function Submit() {
      var from_addr = document.getElementById('faddr').value;
      var to_addr = document.getElementById('taddr').value;
      var data = {
        "faddr": from_addr,
        "taddr": to_addr
      };

      var xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function() {
        if (this.readyState == 4) {
          alert("Status: " + this.status + "\nResponse: " + this.responseText);
        }
      };

      xhttp.open("POST", "http://127.0.0.1:5004/planner", true);
      xhttp.setRequestHeader("Content-Type", "application/json");
      xhttp.send(JSON.stringify(data));
    }
  </script>
  <script type="text/javascript">

    function LoadDrone(droneID, x, y, status) {
      var doc = document.getElementById("map");
      $( doc ).ready(function() {
      var doc_svg = doc.getSVGDocument();
      var svg = doc_svg.getElementById("map-svg");
      var circleNode = svg.getElementById(droneID);

      var color = 'red';

      if (status == 'idle'){
        color = 'green';
      }
      else if (status == 'picking_up'){
        color = 'orange';
      }

      else if (status == 'delivers'){
        color = 'blue';
      }

      if(circleNode == null){
        circleNode = doc_svg.createElementNS("http://www.w3.org/2000/svg", "circle");
        circleNode.setAttributeNS(null, 'cx', x);
        circleNode.setAttributeNS(null, 'cy', y);
        circleNode.setAttributeNS(null, 'r', '5');
        circleNode.setAttributeNS(null, 'fill', color);
        circleNode.setAttributeNS(null, 'id', droneID);
        svg.appendChild(circleNode);  }
      else{
        circleNode.setAttributeNS(null, 'cx', x);
        circleNode.setAttributeNS(null, 'cy', y);
        circleNode.setAttributeNS(null, 'fill', color);
      }
    }
  )
}
  </script> 

  <script>
  function updateTable(server_response) {
    const tbody = document.querySelector("#droneTable tbody");
    tbody.innerHTML = "";

    const drones = Object.keys(server_response).sort((a, b) => {
      return parseInt(a.split("_")[1]) - parseInt(b.split("_")[1]);
    });

    drones.forEach(droneID => {
      const drone = server_response[droneID];

      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${droneID}</td>
        <td>${drone.status}</td>
        <td>${Number(drone.longitude).toFixed(1)}, ${Number(drone.latitude).toFixed(1)} </td>
        <td>${Number(drone.battery).toFixed(0)}</td>
      `;

      tbody.appendChild(row);
    });
  }
  </script>
</head>

<body>

  <a href="/customer"
     style="
       position:absolute;
       top:20px;
       right:20px;
       color:white;
       text-decoration:none;
       font-weight:bold;
       z-index:1000;
     ">
     Customer View
  </a>

  <div class="header">
    <h1>LastMile</h1>
  </div>
  <!--p>Current Position: </p> -->
  <!--div id="txt"></div> -->
  <div class="container">
    <div class="left-panels">
      <div class="panel"> 
        <form action="javascript:Submit()">
        <label for="faddr">Pickup location:</label><br>
        <select id="faddr" name="faddr">
          <option value="ICA Nära Söderlivs">ICA Nära Söderlivs</option>
          <option value="ICA Malmborgs">ICA Malmborgs</option>
          <option value="Coop Mårtenstorget">Coop Mårtenstorget</option>
          <option value="ICA Maxi Stormarknad">ICA Maxi Stormarknad</option>
          </select>
          <br>
          <label for="lname">To address:</label><br>
          <input type="text" id="taddr" name="taddr"><br><br>
          <input type="submit" value="Search addresses">
      </form> 
      </div>

      <div class="panel">
       <table id="droneTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Status</th>
            <th>Coordinates</th>
            <th>Battery</th>
          </tr>
        </thead>
        <tbody>
        </tbody>
      </table>       
      </div>

      <div class="panel">
        <button class="start-btn" onclick="startDemo()" style="margin-top:10px;padding:10px;">
        Start Demo
        </button>       
      </div>
    </div>

    <object id="map" data="static/images/lund-map.svg" type="image/svg+xml" ></object>

  </div>
  <script>
    var set_delay = 10,
    callout = function () {
    $.ajax({
      url: 'http://127.0.0.1:5002/get_drones'
    })
    .done(function (server_response) {
      var avalaible_drones = Object.keys(server_response)
      for (const droneID of avalaible_drones){
        var x = server_response[droneID].longitude
        var y = server_response[droneID].latitude
        var status = server_response[droneID].status
        LoadDrone(droneID, x, y, status)
      }

      updateTable(server_response);
    })
    .always(function (server_response) {
        setTimeout(callout, set_delay);
    });
    };
    callout();    
  </script>

  <script>

    function startDemo(){

      $.ajax({

        url: 'http://127.0.0.1:5003/demo',

        type: 'POST'

      }).done(function(response){

        alert("Demo started!");

      });

    }

  </script>


</body>
</html>
