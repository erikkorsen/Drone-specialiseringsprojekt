<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LastMile Delivery</title>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

  <style>

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }

    .header {
      background-color: #111;
      color: white;
      padding: 15px 20px;
    }

    .header h1 {
      margin: 0;
    }

    .container {
      display: flex;
      gap: 30px;
      padding: 30px;
      align-items: flex-start;
    }

    .order-panel {
      width: 300px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    .order-panel input,
    .order-panel select,
    .order-panel button {

      width: 100%;
      padding: 10px;
      margin-top: 10px;
      box-sizing: border-box;
    }

    .order-panel button {
      background-color: #111;
      color: white;
      border: none;
      cursor: pointer;
    }

    .order-panel button:hover {
      background-color: #333;
    }

    #map {
      width: 1000px;
      height: 750px;
      background: white;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    .status-box {
      margin-top: 20px;
      padding: 10px;
      background: #eee;
      border-radius: 5px;
    }

  </style>
</head>

<body>

<div class="header">
  <h1>LastMile Delivery</h1>
</div>

<div class="container">

  <!-- CUSTOMER ORDER PANEL -->

  <div class="order-panel">

    <h2>Place Delivery</h2>

    <label>Pickup Location</label>

    <select id="faddr">

      <option value="ICA Nära Söderlivs">
        ICA Nära Söderlivs
      </option>

      <option value="ICA Malmborgs">
        ICA Malmborgs
      </option>

      <option value="Coop Mårtenstorget">
        Coop Mårtenstorget
      </option>

      <option value="ICA Maxi Stormarknad">
        ICA Maxi Stormarknad
      </option>

    </select>

    <label>Delivery Address</label>

    <input type="text" id="taddr">

    <button onclick="Submit()">
      Order Delivery
    </button>

    <div class="status-box">
      <strong>Status:</strong>
      <p id="response">Waiting for order...</p>
    </div>

  </div>

  <!-- MAP -->

  <object
    id="map"
    data="static/images/lund-map.svg"
    type="image/svg+xml">
  </object>

</div>

<script>

function Submit() {

  const data = {

    faddr: document.getElementById("faddr").value,

    taddr: document.getElementById("taddr").value
  };

  fetch("http://127.0.0.1:5004/planner", {

    method: "POST",

    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify(data)

  })

  .then(response => response.text())

  .then(data => {

    document.getElementById("response").innerHTML =
      "Delivery order submitted successfully.";

  })

  .catch(error => {

    document.getElementById("response").innerHTML =
      "Error submitting order.";

  });

}

</script>

<script>

function LoadDrone(droneID, x, y, status) {

  var doc = document.getElementById("map");

  $(doc).ready(function() {

    var doc_svg = doc.getSVGDocument();

    if (!doc_svg) return;

    var svg = doc_svg.getElementById("map-svg");

    if (!svg) return;

    var circleNode = svg.getElementById(droneID);

    var color = "red";

    if (status == "idle") {
      color = "green";
    }

    else if (status == "picking_up") {
      color = "orange";
    }

    else if (status == "delivers") {
      color = "blue";
    }

    if (circleNode == null) {

      circleNode =
        doc_svg.createElementNS(
          "http://www.w3.org/2000/svg",
          "circle"
        );

      circleNode.setAttributeNS(null, "cx", x);
      circleNode.setAttributeNS(null, "cy", y);

      circleNode.setAttributeNS(null, "r", "6");

      circleNode.setAttributeNS(null, "fill", color);

      circleNode.setAttributeNS(null, "id", droneID);

      svg.appendChild(circleNode);

    }

    else {

      circleNode.setAttributeNS(null, "cx", x);

      circleNode.setAttributeNS(null, "cy", y);

      circleNode.setAttributeNS(null, "fill", color);
    }

  });

}

</script>

<script>

var set_delay = 10;

var callout = function () {

  $.ajax({

    url: 'http://127.0.0.1:5002/get_drones'

  })

  .done(function(server_response) {

    var available_drones =
      Object.keys(server_response);

    for (const droneID of available_drones) {

      var x =
        server_response[droneID].longitude;

      var y =
        server_response[droneID].latitude;

      var status =
        server_response[droneID].status;

      LoadDrone(droneID, x, y, status);
    }

  })

  .always(function() {

    setTimeout(callout, set_delay);

  });

};

callout();

</script>

</body>
</html>
